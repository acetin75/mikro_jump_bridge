{% extends "base.html" %}
{% block title %}Silme Onayı{% endblock %}
{% block page_title %}Silme Onayı{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header text-danger py-3">
        <i class="bi bi-exclamation-triangle me-2"></i>Silme Onayı
      </div>
      <div class="card-body p-4 text-center">
        <p class="mb-3">Aşağıdaki kaydı silmek istediğinizden emin misiniz?</p>
        <p class="fw-bold fs-5">{{ nesne }}</p>
        <p class="text-danger small">Bu işlem geri alınamaz.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
          {% csrf_token %}
          <button class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Evet, Sil
          </button>
          <a href="{% url geri_url %}" class="btn btn-outline-secondary">İptal</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
