{% extends "base.html" %}
{% block title %}{{ baslik }}{% endblock %}
{% block page_title %}{{ baslik }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for f in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ f.label }}</label>
            {{ f }}
            {% if f.errors %}<div class="text-danger small mt-1">{{ f.errors|striptags }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 justify-content-end mt-3">
            <a href="{% url 'gider:list' %}" class="btn btn-secondary">İptal</a>
            <button type="submit" class="btn btn-primary">Kaydet</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
