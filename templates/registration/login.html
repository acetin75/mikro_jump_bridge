<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş — Muhasebe Bürosu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; border: none; box-shadow: 0 4px 24px rgba(0,0,0,.1); border-radius: 1rem; }
    .brand-icon { width: 56px; height: 56px; background: linear-gradient(135deg,#3b82f6,#6366f1); border-radius: .75rem;
                  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; margin: 0 auto 1rem; }
  </style>
</head>
<body>
  <div class="login-card card p-4">
    <div class="text-center mb-4">
      <div class="brand-icon"><i class="bi bi-building"></i></div>
      <h4 class="fw-bold mb-0">Muhasebe Bürosu</h4>
      <p class="text-muted small mt-1">Devam etmek için giriş yapın</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger small py-2">
      <i class="bi bi-exclamation-triangle me-1"></i>
      Kullanıcı adı veya şifre hatalı.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">Kullanıcı Adı</label>
        <input type="text" name="username" class="form-control" autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Şifre</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i>Giriş Yap
      </button>
    </form>
  </div>
</body>
</html>
