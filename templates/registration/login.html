{% load i18n %}
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş — Mikro Sync</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body style="background:linear-gradient(135deg,#1e3a5f,#0d2137);min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <div class="card shadow-lg" style="width:360px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-arrow-left-right" style="font-size:2.5rem;color:#1e3a5f"></i>
        <h4 class="mt-2 fw-bold" style="color:#1e3a5f">Mikro Sync</h4>
        <p class="text-muted small">Mikro ERP Köprüsü</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Kullanıcı Adı</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Şifre</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        {% if form.errors %}
          <div class="alert alert-danger py-2 small">Kullanıcı adı veya şifre hatalı.</div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
      </form>
    </div>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
