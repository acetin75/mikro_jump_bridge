{% extends "base.html" %}
{% block title %}{{ baslik }}{% endblock %}
{% block page_title %}{{ baslik }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle"></i> Kaydet
            </button>
            {% if kasa %}
              <a href="{% url 'kasa:detay' kasa.pk %}" class="btn btn-secondary">İptal</a>
            {% else %}
              <a href="{% url 'kasa:list' %}" class="btn btn-secondary">İptal</a>
            {% endif %}
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
